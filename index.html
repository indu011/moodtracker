<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Tracker</title>
    <style>
        /* Background Gradient */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        /* Main container card */
        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffffcc; /* semi-transparent white */
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        /* Headings */
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #333;
        }

        h2 {
            margin-top: 20px;
            color: #444;
        }

        h3 {
            margin: 15px 0 10px;
            color: #222;
        }

        /* Emoji Buttons */
        button.emoji-btn {
            font-size: 28px;
            margin: 8px;
            padding: 15px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button.emoji-btn:hover {
            background: #ffd166;
            transform: scale(1.2);
        }

        /* Textarea styling */
        textarea {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            resize: none;
        }

        /* Submit button */
        button[type="submit"] {
            margin-top: 15px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #06d6a0;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        button[type="submit"]:hover {
            background: #118ab2;
        }

        /* Entries */
        .entry {
            background: #ffffffee;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: left;
        }

        .entry strong {
            font-size: 18px;
        }

        .entry small {
            color: gray;
            display: block;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😊 Mood Tracker</h1>
        <form method="POST">
            <h3>Select your mood:</h3>
            <div>
                <button type="button" class="emoji-btn" onclick="selectMood('Happy', '😀')">😀</button>
                <button type="button" class="emoji-btn" onclick="selectMood('Sad', '😢')">😢</button>
                <button type="button" class="emoji-btn" onclick="selectMood('Angry', '😡')">😡</button>
                <button type="button" class="emoji-btn" onclick="selectMood('Excited', '🤩')">🤩</button>
                <button type="button" class="emoji-btn" onclick="selectMood('Calm', '😌')">😌</button>
            </div>

            <!-- Hidden inputs -->
            <input type="hidden" id="mood" name="mood" required>
            <input type="hidden" id="emoji" name="emoji" required>

            <textarea name="note" placeholder="Write a note about your day..." rows="3"></textarea>
            <br>
            <button type="submit">💾 Save Mood</button>
        </form>

        <h2>📜 Previous Entries</h2>
        {% for mood, note, emoji, timestamp in entries %}
            <div class="entry">
                <strong>{{ emoji }} {{ mood }}</strong>
                <small>{{ timestamp }}</small>
                <p>{{ note }}</p>
            </div>
        {% endfor %}
    </div>

    <script>
        function selectMood(mood, emoji) {
            document.getElementById("mood").value = mood;
            document.getElementById("emoji").value = emoji;
        }
    </script>
</body>
</html>
